[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

[functions]
  node_bundler = "esbuild"

[functions."sync-kantankaigo"]
  timeout = 60

[functions."cron-sync-kantankaigo"]
  timeout = 60

[[redirects]]
  from = "/api/sync-kantankaigo"
  to = "/.netlify/functions/sync-kantankaigo"
  status = 200

[[redirects]]
  from = "/api/cron-sync-kantankaigo"
  to = "/.netlify/functions/cron-sync-kantankaigo"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
